<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Circular arrow (pixel art) -->
  <!-- Top arc -->
  <rect x="10" y="4" width="12" height="2" fill="#00e676"/>
  <rect x="8" y="6" width="4" height="2" fill="#00e676"/>
  <rect x="20" y="6" width="4" height="2" fill="#00e676"/>
  <rect x="6" y="8" width="2" height="4" fill="#00e676"/>
  <rect x="24" y="8" width="2" height="4" fill="#00e676"/>
  <!-- Bottom arc -->
  <rect x="10" y="26" width="12" height="2" fill="#00e676"/>
  <rect x="8" y="24" width="4" height="2" fill="#00e676"/>
  <rect x="20" y="24" width="4" height="2" fill="#00e676"/>
  <rect x="6" y="18" width="2" height="4" fill="#00e676"/>
  <rect x="24" y="18" width="2" height="4" fill="#00e676"/>
  <!-- Arrow head top-right -->
  <rect x="22" y="4" width="4" height="2" fill="#69f0ae"/>
  <rect x="24" y="6" width="2" height="2" fill="#69f0ae"/>
  <rect x="20" y="4" width="2" height="4" fill="#69f0ae"/>
  <!-- Center dot -->
  <rect x="14" y="14" width="4" height="4" fill="#00e676" opacity="0.3"/>
  <rect x="15" y="15" width="2" height="2" fill="#00e676"/>
</svg>
