  <rect x="4" y="26" width="6" height="2" fill="#ff6e6e"/>
  <rect x="8" y="22" width="2" height="6" fill="#ff6e6e"/>
  <!-- Right handle -->
  <rect x="26" y="18" width="2" height="10" fill="#ff6e6e"/>
  <rect x="24" y="18" width="2" height="2" fill="#ff6e6e"/>
  <rect x="22" y="26" width="6" height="2" fill="#ff6e6e"/>
  <rect x="22" y="22" width="2" height="6" fill="#ff6e6e"/>
</svg>
