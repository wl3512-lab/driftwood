<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Left blade -->
  <rect x="4" y="4" width="2" height="2" fill="#ff6e6e"/>
  <rect x="6" y="6" width="2" height="2" fill="#ff6e6e"/>
  <rect x="8" y="8" width="2" height="2" fill="#ff6e6e"/>
  <rect x="10" y="10" width="2" height="2" fill="#ff6e6e"/>
  <rect x="12" y="12" width="4" height="4" fill="#ff6e6e"/>
  <!-- Right blade -->
  <rect x="26" y="4" width="2" height="2" fill="#ff6e6e"/>
  <rect x="24" y="6" width="2" height="2" fill="#ff6e6e"/>
  <rect x="22" y="8" width="2" height="2" fill="#ff6e6e"/>
  <rect x="20" y="10" width="2" height="2" fill="#ff6e6e"/>
