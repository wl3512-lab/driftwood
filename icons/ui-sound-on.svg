<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Speaker body -->
  <rect x="3" y="12" width="5" height="8" fill="#00e676"/>
  <!-- Speaker cone -->
  <rect x="8" y="11" width="2" height="10" fill="#00e676"/>
  <rect x="10" y="9" width="2" height="14" fill="#00e676"/>
  <rect x="12" y="7" width="2" height="18" fill="#00e676"/>
  <!-- Sound wave 1 (inner) -->
  <rect x="16" y="12" width="2" height="2" fill="#69f0ae"/>
  <rect x="17" y="14" width="2" height="4" fill="#69f0ae"/>
  <rect x="16" y="18" width="2" height="2" fill="#69f0ae"/>
  <!-- Sound wave 2 (outer) -->
  <rect x="20" y="10" width="2" height="2" fill="#69f0ae"/>
  <rect x="21" y="12" width="2" height="8" fill="#69f0ae"/>
  <rect x="20" y="20" width="2" height="2" fill="#69f0ae"/>
</svg>
