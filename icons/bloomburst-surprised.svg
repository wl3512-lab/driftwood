  <rect x="12" y="2" width="4" height="4" fill="#f5a0b8"/>
  <rect x="16" y="2" width="4" height="4" fill="#f5a0b8"/>
  <rect x="6" y="6" width="4" height="4" fill="#e87ba0"/>
  <rect x="22" y="6" width="4" height="4" fill="#e87ba0"/>
  <rect x="2" y="12" width="4" height="4" fill="#e87ba0"/>
  <rect x="26" y="12" width="4" height="4" fill="#e87ba0"/>
  <rect x="2" y="16" width="4" height="4" fill="#d45a7a"/>
  <rect x="26" y="16" width="4" height="4" fill="#d45a7a"/>
  <rect x="6" y="20" width="4" height="4" fill="#d45a7a"/>
  <rect x="22" y="20" width="4" height="4" fill="#d45a7a"/>
  <!-- Inner petals -->
  <rect x="8" y="8" width="4" height="4" fill="#f5c4d0"/>
  <rect x="20" y="8" width="4" height="4" fill="#f5c4d0"/>
  <rect x="8" y="18" width="4" height="4" fill="#f5c4d0"/>
  <rect x="20" y="18" width="4" height="4" fill="#f5c4d0"/>
  <rect x="6" y="12" width="4" height="4" fill="#f5b0c0"/>
  <rect x="22" y="12" width="4" height="4" fill="#f5b0c0"/>
  <rect x="6" y="16" width="4" height="4" fill="#f5b0c0"/>
  <rect x="22" y="16" width="4" height="4" fill="#f5b0c0"/>
  <!-- Center -->
  <rect x="12" y="10" width="4" height="4" fill="#ffeef0"/>
  <rect x="16" y="10" width="4" height="4" fill="#ffeef0"/>
  <rect x="10" y="12" width="4" height="4" fill="#ffeef0"/>
  <rect x="18" y="12" width="4" height="4" fill="#ffeef0"/>
  <rect x="12" y="14" width="4" height="4" fill="#ffe0e8"/>
  <rect x="16" y="14" width="4" height="4" fill="#ffe0e8"/>
  <rect x="10" y="16" width="4" height="4" fill="#ffe0e8"/>
  <rect x="18" y="16" width="4" height="4" fill="#ffe0e8"/>
  <!-- Center dot -->
  <rect x="14" y="12" width="4" height="4" fill="#d45a7a"/>
  <rect x="14" y="16" width="4" height="4" fill="#c44a6a"/>
  <!-- Stem -->
  <rect x="14" y="22" width="4" height="4" fill="#3a8f5c"/>
  <rect x="14" y="26" width="4" height="4" fill="#2d7a4a"/>
  <rect x="14" y="30" width="2" height="2" fill="#245e3a"/>
  <!-- Leaves -->
  <rect x="18" y="24" width="4" height="4" fill="#6bbe8a"/>
  <rect x="10" y="26" width="4" height="4" fill="#6bbe8a"/>
</svg>
