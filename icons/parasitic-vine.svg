  <rect x="14" y="4" width="4" height="4" fill="#8a2a3a"/>
  <rect x="16" y="8" width="4" height="4" fill="#7a2030"/>
  <rect x="14" y="12" width="4" height="4" fill="#6a1828"/>
  <rect x="12" y="16" width="4" height="4" fill="#5a1020"/>
  <rect x="14" y="20" width="4" height="4" fill="#4a0a18"/>
  <rect x="14" y="24" width="4" height="4" fill="#3a0810"/>
  <rect x="14" y="28" width="4" height="4" fill="#2a0608"/>
  <!-- Tendrils reaching out (grabbing) -->
  <rect x="20" y="6" width="4" height="4" fill="#a03a4a"/>
  <rect x="24" y="4" width="4" height="4" fill="#b04a5a"/>
  <rect x="8" y="10" width="4" height="4" fill="#a03a4a"/>
  <rect x="4" y="8" width="4" height="4" fill="#b04a5a"/>
  <rect x="20" y="14" width="4" height="4" fill="#903040"/>
  <rect x="24" y="16" width="4" height="4" fill="#a03a4a"/>
  <rect x="8" y="18" width="4" height="4" fill="#903040"/>
  <rect x="4" y="20" width="4" height="4" fill="#a03a4a"/>
  <rect x="20" y="22" width="4" height="4" fill="#802838"/>
  <rect x="8" y="24" width="4" height="4" fill="#802838"/>
  <!-- Thorns/barbs -->
  <rect x="26" y="2" width="4" height="4" fill="#c05a6a"/>
  <rect x="2" y="6" width="4" height="4" fill="#c05a6a"/>
  <rect x="26" y="14" width="4" height="4" fill="#c05a6a"/>
  <rect x="2" y="18" width="4" height="4" fill="#c05a6a"/>
  <!-- Poison dots (glowing) -->
  <rect x="18" y="10" width="2" height="2" fill="#ff6b6b"/>
  <rect x="10" y="14" width="2" height="2" fill="#ff6b6b"/>
  <rect x="18" y="18" width="2" height="2" fill="#ff6b6b"/>
  <rect x="10" y="22" width="2" height="2" fill="#ff6b6b"/>
  <rect x="16" y="26" width="2" height="2" fill="#ff6b6b"/>
</svg>
