<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="crispEdges">
  <!-- THORNWEED — Stressed Mood -->
  <!-- Main body (reddish-orange) -->
  <rect x="12" y="8" width="4" height="4" fill="#d4503a"/>
  <rect x="16" y="8" width="4" height="4" fill="#d4503a"/>
  <rect x="12" y="12" width="4" height="4" fill="#c44030"/>
  <rect x="16" y="12" width="4" height="4" fill="#c44030"/>
  <rect x="12" y="16" width="4" height="4" fill="#b43828"/>
  <rect x="16" y="16" width="4" height="4" fill="#b43828"/>
  <rect x="12" y="20" width="4" height="4" fill="#a43020"/>
  <rect x="16" y="20" width="4" height="4" fill="#a43020"/>
  <!-- Thorns (spiky bits sticking out) -->
  <rect x="8" y="8" width="4" height="4" fill="#e86a5e"/>
  <rect x="4" y="6" width="4" height="4" fill="#e86a5e"/>
  <rect x="20" y="12" width="4" height="4" fill="#e86a5e"/>
  <rect x="24" y="10" width="4" height="4" fill="#e86a5e"/>
  <rect x="8" y="16" width="4" height="4" fill="#e86a5e"/>
  <rect x="4" y="18" width="4" height="4" fill="#e86a5e"/>
  <rect x="20" y="20" width="4" height="4" fill="#e86a5e"/>
  <rect x="24" y="22" width="4" height="4" fill="#e86a5e"/>
  <!-- Top thorns -->
  <rect x="10" y="4" width="4" height="4" fill="#e8806e"/>
  <rect x="18" y="4" width="4" height="4" fill="#e8806e"/>
  <rect x="14" y="2" width="4" height="4" fill="#e8806e"/>
  <!-- Stem -->
  <rect x="14" y="24" width="4" height="4" fill="#6a4a3a"/>
  <rect x="14" y="28" width="4" height="4" fill="#5a3a2a"/>
  <!-- Ground thorns -->
  <rect x="10" y="28" width="4" height="4" fill="#8a5a4a"/>
  <rect x="18" y="28" width="4" height="4" fill="#8a5a4a"/>
</svg>
