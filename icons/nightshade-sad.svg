<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="crispEdges">
  <!-- NIGHTSHADE — Sad Mood -->
  <!-- Drooping petals (indigo/purple) -->
  <rect x="10" y="6" width="4" height="4" fill="#7b8ce8"/>
  <rect x="18" y="6" width="4" height="4" fill="#7b8ce8"/>
  <rect x="6" y="10" width="4" height="4" fill="#5a6ad4"/>
  <rect x="22" y="10" width="4" height="4" fill="#5a6ad4"/>
  <!-- Center bud -->
  <rect x="12" y="8" width="4" height="4" fill="#9b8ce8"/>
  <rect x="16" y="8" width="4" height="4" fill="#9b8ce8"/>
  <rect x="12" y="12" width="4" height="4" fill="#5a4a9e"/>
  <rect x="16" y="12" width="4" height="4" fill="#5a4a9e"/>
  <rect x="10" y="10" width="4" height="4" fill="#8a7ad8"/>
  <rect x="18" y="10" width="4" height="4" fill="#8a7ad8"/>
  <!-- Drooping petal (hanging down-right) -->
  <rect x="20" y="14" width="4" height="4" fill="#5a6ad4"/>
  <rect x="22" y="16" width="4" height="4" fill="#4a5ab0"/>
  <!-- Drooping petal (hanging down-left) -->
  <rect x="8" y="14" width="4" height="4" fill="#5a6ad4"/>
  <rect x="6" y="16" width="4" height="4" fill="#4a5ab0"/>
  <!-- Stem (slightly curved/drooping) -->
  <rect x="14" y="16" width="4" height="4" fill="#2d7a4a"/>
  <rect x="14" y="20" width="4" height="4" fill="#3a8f5c"/>
  <rect x="12" y="24" width="4" height="4" fill="#2d7a4a"/>
  <rect x="12" y="28" width="4" height="4" fill="#245e3a"/>
  <!-- Wilted leaf -->
  <rect x="16" y="22" width="4" height="4" fill="#4a7a5a"/>
  <rect x="8" y="26" width="4" height="4" fill="#4a7a5a"/>
</svg>
