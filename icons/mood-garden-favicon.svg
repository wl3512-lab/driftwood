<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="256" height="256" shape-rendering="crispEdges">
  <!-- MOOD GARDEN FAVICON — Minimal flower-eye -->
  <!-- Petals -->
  <rect x="6" y="0" width="2" height="2" fill="#f0c850"/>
  <rect x="8" y="0" width="2" height="2" fill="#e8b830"/>
  <rect x="2" y="4" width="2" height="2" fill="#f0c850"/>
  <rect x="12" y="4" width="2" height="2" fill="#f0c850"/>
  <rect x="0" y="6" width="2" height="2" fill="#e8b830"/>
  <rect x="14" y="6" width="2" height="2" fill="#e8b830"/>
  <rect x="0" y="8" width="2" height="2" fill="#f0c850"/>
  <rect x="14" y="8" width="2" height="2" fill="#f0c850"/>
  <rect x="2" y="10" width="2" height="2" fill="#e8b830"/>
  <rect x="12" y="10" width="2" height="2" fill="#e8b830"/>
  <rect x="4" y="2" width="2" height="2" fill="#f5d87a"/>
  <rect x="10" y="2" width="2" height="2" fill="#f5d87a"/>
  <rect x="4" y="12" width="2" height="2" fill="#f5d87a"/>
  <rect x="10" y="12" width="2" height="2" fill="#f5d87a"/>
  <!-- Dark center -->
  <rect x="4" y="4" width="2" height="2" fill="#2c2418"/>
  <rect x="6" y="4" width="2" height="2" fill="#2c2418"/>
  <rect x="8" y="4" width="2" height="2" fill="#2c2418"/>
  <rect x="10" y="4" width="2" height="2" fill="#2c2418"/>
  <rect x="4" y="6" width="2" height="2" fill="#2c2418"/>
  <rect x="10" y="6" width="2" height="2" fill="#2c2418"/>
  <rect x="4" y="8" width="2" height="2" fill="#2c2418"/>
  <rect x="10" y="8" width="2" height="2" fill="#2c2418"/>
  <rect x="4" y="10" width="2" height="2" fill="#2c2418"/>
  <rect x="6" y="10" width="2" height="2" fill="#2c2418"/>
  <rect x="8" y="10" width="2" height="2" fill="#2c2418"/>
  <rect x="10" y="10" width="2" height="2" fill="#2c2418"/>
  <!-- Eye iris -->
  <rect x="6" y="6" width="2" height="2" fill="#3a8f5c"/>
  <rect x="8" y="6" width="2" height="2" fill="#3a8f5c"/>
  <rect x="6" y="8" width="2" height="2" fill="#2d7a4a"/>
  <rect x="8" y="8" width="2" height="2" fill="#2d7a4a"/>
  <!-- Pupil -->
  <rect x="8" y="6" width="2" height="2" fill="#0a0e14"/>
  <!-- Catchlight -->
  <rect x="6" y="6" width="1" height="1" fill="#ffffff"/>
  <!-- Stem -->
  <rect x="7" y="13" width="2" height="3" fill="#3a8f5c"/>
  <!-- Leaves -->
  <rect x="5" y="14" width="2" height="1" fill="#6bbe8a"/>
  <rect x="9" y="14" width="2" height="1" fill="#6bbe8a"/>
