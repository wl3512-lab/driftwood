<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Big star center -->
  <rect x="14" y="4" width="4" height="4" fill="#ffd54f"/>
  <rect x="14" y="24" width="4" height="4" fill="#ffd54f"/>
  <rect x="4" y="14" width="4" height="4" fill="#ffd54f"/>
  <rect x="24" y="14" width="4" height="4" fill="#ffd54f"/>
  <!-- Diagonals -->
  <rect x="10" y="8" width="2" height="2" fill="#ffb347"/>
  <rect x="20" y="8" width="2" height="2" fill="#ffb347"/>
  <rect x="10" y="22" width="2" height="2" fill="#ffb347"/>
  <rect x="20" y="22" width="2" height="2" fill="#ffb347"/>
  <!-- Center -->
  <rect x="12" y="12" width="8" height="8" fill="#ffd54f"/>
  <rect x="13" y="13" width="6" height="6" fill="#fff9c4"/>
  <rect x="14" y="14" width="4" height="4" fill="#ffffff" opacity="0.9"/>
  <!-- Small sparkles -->
  <rect x="4" y="4" width="2" height="2" fill="#ffd54f" opacity="0.6"/>
  <rect x="26" y="4" width="2" height="2" fill="#ffd54f" opacity="0.6"/>
  <rect x="4" y="26" width="2" height="2" fill="#ffd54f" opacity="0.6"/>
  <rect x="26" y="26" width="2" height="2" fill="#ffd54f" opacity="0.6"/>
</svg>
