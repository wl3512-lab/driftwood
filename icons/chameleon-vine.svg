<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="crispEdges">
  <!-- CHAMELEON VINE — Mood-Mirror Plant (no stable identity) -->
  <!-- Vine body (shifting rainbow/gradient colors) -->
  <rect x="14" y="2" width="4" height="4" fill="#f0c850"/>
  <rect x="18" y="4" width="4" height="4" fill="#e87ba0"/>
  <rect x="20" y="8" width="4" height="4" fill="#5a6ad4"/>
  <rect x="18" y="12" width="4" height="4" fill="#3a8f5c"/>
  <rect x="14" y="14" width="4" height="4" fill="#d4503a"/>
  <rect x="10" y="12" width="4" height="4" fill="#f0c850"/>
  <rect x="8" y="8" width="4" height="4" fill="#e87ba0"/>
  <rect x="10" y="4" width="4" height="4" fill="#5a6ad4"/>
  <!-- Center cluster (all colors mixed) -->
  <rect x="12" y="8" width="4" height="4" fill="#c49a1a"/>
  <rect x="16" y="8" width="4" height="4" fill="#7a6ad4"/>
  <rect x="12" y="10" width="4" height="4" fill="#d45a7a"/>
  <rect x="16" y="10" width="4" height="4" fill="#3a8f5c"/>
  <!-- Trailing vines down -->
  <rect x="12" y="16" width="4" height="4" fill="#9b8ce8"/>
  <rect x="16" y="18" width="4" height="4" fill="#6bbe8a"/>
  <rect x="14" y="20" width="4" height="4" fill="#e8913a"/>
  <rect x="12" y="22" width="4" height="4" fill="#d45a7a"/>
  <rect x="14" y="24" width="4" height="4" fill="#5a6ad4"/>
  <rect x="16" y="26" width="4" height="4" fill="#f0c850"/>
  <rect x="14" y="28" width="4" height="4" fill="#3a8f5c"/>
  <!-- Side tendrils (reaching for you) -->
  <rect x="6" y="6" width="4" height="4" fill="#c49a1a"/>
  <rect x="4" y="10" width="4" height="4" fill="#d4503a"/>
  <rect x="22" y="6" width="4" height="4" fill="#7ec9a0"/>
  <rect x="24" y="10" width="4" height="4" fill="#7b8ce8"/>
  <!-- Shimmer dots -->
  <rect x="10" y="6" width="2" height="2" fill="#ffffff"/>
  <rect x="20" y="10" width="2" height="2" fill="#ffffff"/>
  <rect x="12" y="14" width="2" height="2" fill="#ffffff"/>
</svg>
