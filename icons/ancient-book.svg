<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="128" height="128" shape-rendering="crispEdges">
  <!-- ANCIENT BOOK — Training Manual / Rule Book -->
  <!-- Back cover (darker, worn leather) -->
  <rect x="4" y="6" width="24" height="22" fill="#5a3a20"/>
  <rect x="4" y="6" width="24" height="2" fill="#4a2e18"/>
  <rect x="4" y="26" width="24" height="2" fill="#4a2e18"/>
  <!-- Spine (left edge, thick binding) -->
  <rect x="2" y="4" width="4" height="26" fill="#4a2e18"/>
  <rect x="2" y="4" width="2" height="26" fill="#3e2412"/>
  <rect x="4" y="4" width="2" height="26" fill="#5a3a20"/>
  <!-- Spine ridges -->
  <rect x="2" y="8" width="4" height="2" fill="#3a2010"/>
  <rect x="2" y="14" width="4" height="2" fill="#3a2010"/>
  <rect x="2" y="20" width="4" height="2" fill="#3a2010"/>
  <rect x="2" y="26" width="4" height="2" fill="#3a2010"/>
  <!-- Front cover (leather, slightly lighter) -->
  <rect x="6" y="4" width="22" height="24" fill="#6a4a28"/>
  <rect x="8" y="4" width="18" height="24" fill="#7a5a38"/>
  <!-- Cover border / tooling (embossed frame) -->
  <rect x="8" y="6" width="18" height="2" fill="#5a3a20"/>
  <rect x="8" y="24" width="18" height="2" fill="#5a3a20"/>
  <rect x="8" y="6" width="2" height="20" fill="#5a3a20"/>
  <rect x="24" y="6" width="2" height="20" fill="#5a3a20"/>
  <!-- Inner cover (slightly worn) -->
  <rect x="10" y="8" width="14" height="16" fill="#8a6a48"/>
  <!-- Gold emblem / symbol (centered on cover) -->
  <!-- Eye/knowledge symbol -->
  <rect x="14" y="12" width="6" height="2" fill="#d4960a"/>
  <rect x="12" y="14" width="10" height="2" fill="#d4960a"/>
  <rect x="14" y="16" width="6" height="2" fill="#d4960a"/>
  <!-- Pupil -->
  <rect x="16" y="14" width="2" height="2" fill="#f0c850"/>
  <!-- Gold corner flourishes -->
  <rect x="10" y="8" width="4" height="2" fill="#c49a1a"/>
  <rect x="10" y="8" width="2" height="4" fill="#c49a1a"/>
  <rect x="20" y="8" width="4" height="2" fill="#c49a1a"/>
  <rect x="22" y="8" width="2" height="4" fill="#c49a1a"/>
  <rect x="10" y="22" width="4" height="2" fill="#c49a1a"/>
  <rect x="10" y="20" width="2" height="4" fill="#c49a1a"/>
  <rect x="20" y="22" width="4" height="2" fill="#c49a1a"/>
  <rect x="22" y="20" width="2" height="4" fill="#c49a1a"/>
  <!-- Gold title lines (abstract text marks) -->
  <rect x="12" y="10" width="10" height="1" fill="#c49a1a" opacity="0.6"/>
  <rect x="14" y="19" width="6" height="1" fill="#c49a1a" opacity="0.6"/>
  <!-- Pages visible (bottom edge, peeking out) -->
  <rect x="6" y="28" width="22" height="2" fill="#f0ece4"/>
  <rect x="6" y="28" width="22" height="1" fill="#e8dcc4"/>
  <rect x="7" y="29" width="20" height="1" fill="#f5f0e8"/>
  <!-- Page edge detail (stacked pages) -->
  <rect x="28" y="6" width="2" height="22" fill="#f0ece4"/>
  <rect x="28" y="6" width="1" height="22" fill="#e8dcc4"/>
  <rect x="29" y="8" width="1" height="18" fill="#f5f0e8"/>
  <!-- Clasp / buckle (metal closure) -->
  <rect x="26" y="14" width="4" height="6" fill="#8a9aa8"/>
  <rect x="28" y="14" width="2" height="6" fill="#6a7a88"/>
  <rect x="26" y="14" width="4" height="2" fill="#9aaab8"/>
  <rect x="27" y="16" width="2" height="2" fill="#4a5a68"/>
  <!-- Wear marks / aging -->
  <rect x="12" y="4" width="2" height="2" fill="#6a4a28" opacity="0.5"/>
  <rect x="20" y="24" width="2" height="2" fill="#5a3a20" opacity="0.5"/>
  <rect x="8" y="18" width="2" height="2" fill="#5a3a20" opacity="0.4"/>
  <!-- Top of book -->
  <rect x="2" y="2" width="26" height="2" fill="#4a2e18"/>
  <rect x="4" y="2" width="24" height="2" fill="#5a3a20"/>
  <rect x="6" y="2" width="22" height="1" fill="#6a4a28"/>
  <!-- Bottom -->
  <rect x="2" y="30" width="26" height="2" fill="#3e2412"/>
  <rect x="4" y="30" width="24" height="2" fill="#4a2e18"/>
</svg>
