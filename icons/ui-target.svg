<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="64" height="64" shape-rendering="crispEdges">
  <!-- Outer ring (red) -->
  <rect x="4" y="1" width="8" height="2" fill="#e53935"/>
  <rect x="2" y="3" width="2" height="2" fill="#e53935"/>
  <rect x="12" y="3" width="2" height="2" fill="#e53935"/>
  <rect x="1" y="5" width="2" height="6" fill="#e53935"/>
  <rect x="13" y="5" width="2" height="6" fill="#e53935"/>
  <rect x="2" y="11" width="2" height="2" fill="#e53935"/>
  <rect x="12" y="11" width="2" height="2" fill="#e53935"/>
  <rect x="4" y="13" width="8" height="2" fill="#e53935"/>

  <!-- White ring -->
  <rect x="4" y="3" width="8" height="2" fill="#ffffff"/>
  <rect x="3" y="5" width="2" height="6" fill="#ffffff"/>
  <rect x="11" y="5" width="2" height="6" fill="#ffffff"/>
  <rect x="4" y="11" width="8" height="2" fill="#ffffff"/>

  <!-- Middle red ring -->
  <rect x="5" y="5" width="6" height="2" fill="#e53935"/>
  <rect x="5" y="9" width="6" height="2" fill="#e53935"/>
  <rect x="5" y="5" width="2" height="6" fill="#e53935"/>
  <rect x="9" y="5" width="2" height="6" fill="#e53935"/>

  <!-- Bullseye (white fill) -->
  <rect x="7" y="5" width="2" height="6" fill="#ffffff"/>
  <rect x="5" y="7" width="6" height="2" fill="#ffffff"/>

  <!-- Center dot (red) -->
  <rect x="7" y="7" width="2" height="2" fill="#e53935"/>
</svg>
